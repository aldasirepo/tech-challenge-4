name: Self-Healing - Pod Restart

on:
  repository_dispatch:
    types: [alert-pod-crashloop]

jobs:
  self-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name togglemaster-eks --region us-east-1

      - name: Restart deployment
        run: |
          NAMESPACE="${{ github.event.client_payload.namespace }}"
          DEPLOYMENT="${{ github.event.client_payload.deployment }}"

          echo "Reiniciando $DEPLOYMENT no namespace $NAMESPACE..."
          kubectl rollout restart deployment/$DEPLOYMENT -n $NAMESPACE

          echo "Aguardando rollout..."
          kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=120s

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          NAMESPACE="${{ github.event.client_payload.namespace }}"
          DEPLOYMENT="${{ github.event.client_payload.deployment }}"

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \"🔧 *Self-Healing executado*\n*Deployment:* $DEPLOYMENT\n*Namespace:* $NAMESPACE\n*Status:* $STATUS\"
            }"
